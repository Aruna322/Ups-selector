# ==========================================================
# IMPORT SECTION
# ==========================================================
# These are Python modules/libraries used in this script.

# sync_playwright is used to control the browser using Playwright.
# It allows us to open Chrome, click buttons, select dropdown values, etc.
from playwright.sync_api import sync_playwright

# datetime is used to create timestamped file names.
# Example: dell_ups_results_20260424_140000.csv
from datetime import datetime

# os is used to create folders and build file paths.
# Example: create screenshots folder if it does not exist.
import os

# csv is used to create and write the final test report.
import csv

# re means regular expression.
# It is used to detect patterns like "0 Results" or "50 Results".
import re


# ==========================================================
# CONFIG SECTION
# ==========================================================
# This section contains basic settings.
# You can change these values if required.

# This is the Dell UPS Selector website URL.
BASE_URL = "https://dellups.com/ups-selector/"

# HEADLESS = False means browser will open visibly.
# HEADLESS = True means browser will run in the background.
HEADLESS = True

# SLOW_MO slows down each Playwright action slightly.
# This is useful when testing dynamic websites.
SLOW_MO = 80

# Main output folder name.
# CSV report and screenshots will be saved inside this folder.
OUTPUT_DIR = "dell_ups_test_output"

# Screenshots will be saved inside this subfolder.
SCREENSHOT_DIR = os.path.join(OUTPUT_DIR, "screenshots")

# Create screenshot folder if it does not already exist.
# exist_ok=True means do not throw error if folder already exists.
os.makedirs(SCREENSHOT_DIR, exist_ok=True)

# Create a timestamp for the current run.
# This helps create unique CSV file names.
RUN_ID = datetime.now().strftime("%Y%m%d_%H%M%S")

# Final CSV report file path.
CSV_FILE = os.path.join(OUTPUT_DIR, f"dell_ups_results_{RUN_ID}.csv")

# These are the columns that will appear in the CSV report.
CSV_COLUMNS = [
    "Country",
    "Results Page Opened",
    "Status",
    "Reason",
    "Continue Clicked",
    "Products Count",
    "Screenshot",
]


# ==========================================================
# TEXT RULES SECTION
# ==========================================================
# These lists help the script make decisions:
# - Which buttons should not be clicked
# - Which text means no products found
# - Which text pattern means product count is available


# These are buttons/menu items that should NEVER be clicked.
# Example: "Select Your Region" is not the Continue button.
BLOCKED_BUTTON_TEXTS = [
    "select your region",
    "products",
    "software and services",
    "resources",
    "contact",
    "support",
    "menu",
    "filter by",
    "change requirements",

    # Chinese / Taiwan / Japan menu words
    "选择您的地区",
    "選擇您的地區",
    "地域を選択",
    "产品",
    "產品",
    "製品",
    "资源",
    "資源",
    "联系",
    "聯繫",
    "お問い合わせ",
]


# These are regex patterns for zero-result pages.
# Regex is safer than plain text search.
#
# Important example:
# "50 Results" contains "0 Result" as text inside it.
# So we should NOT search plain "0 result".
# Regex checks exact "0 Results" only.
ZERO_RESULT_PATTERNS = [
    # English / European result count formats
    r"\b0\s+results?\b",
    r"\b0\s+ergebnisse\b",
    r"\b0\s+résultats?\b",
    r"\b0\s+resultados?\b",
    r"\b0\s+risultati?\b",
    r"\b0\s+resultaten\b",

    # China / Taiwan result count formats
    r"0\s*个结果",
    r"0\s*個結果",
    r"0\s*条结果",
    r"0\s*項結果",

    # Japan result count formats
    r"0\s*件の結果",
    r"0\s*検索結果",
    r"0\s*件",
]


# These are direct no-result messages.
# If any of these appear after clicking Continue, the country should FAIL.
NO_RESULT_TEXTS = [
    # English
    "nothing found",
    "no results found",
    "no products found",
    "there are no results found",
    "sorry, there are no results found",

    # German / French / Spanish / Portuguese / Italian
    "keine ergebnisse",
    "keine produkte",
    "aucun résultat",
    "aucun produit",
    "sin resultados",
    "sin productos",
    "sem resultados",
    "sem produtos",
    "nessun risultato",
    "nessun prodotto",

    # Russian
    "нет результатов",
    "товары не найдены",

    # Chinese simplified
    "未找到",
    "没有找到",
    "没有结果",
    "无结果",
    "未找到结果",
    "未找到产品",
    "没有找到产品",

    # Traditional Chinese / Taiwan
    "沒有找到",
    "沒有結果",
    "無結果",
    "未找到產品",
    "沒有找到產品",

    # Japanese
    "見つかりません",
    "結果が見つかりません",
    "製品が見つかりません",
    "該当する結果はありません",
    "検索結果はありません",
    "何も見つかりません",
]


# These patterns are used only to capture product count if available.
# If product count is not found, script will still PASS if no no-result text is found.
COUNT_PATTERNS = [
    # English / European count formats
    r"\b(\d+)\s+results?\b",
    r"\b(\d+)\s+ergebnisse\b",
    r"\b(\d+)\s+résultats?\b",
    r"\b(\d+)\s+resultados?\b",
    r"\b(\d+)\s+risultati?\b",
    r"\b(\d+)\s+resultaten\b",

    # China / Taiwan count formats
    r"(\d+)\s*个结果",
    r"(\d+)\s*個結果",
    r"(\d+)\s*条结果",
    r"(\d+)\s*項結果",
    r"(\d+)\s*結果",

    # Japan count formats
    r"(\d+)\s*件の結果",
    r"(\d+)\s*検索結果",
]


# ==========================================================
# COMMON HELPER FUNCTIONS
# ==========================================================


def safe_name(name):
    """
    Purpose:
        Convert country name into a safe file name.

    Why:
        Some country names may contain spaces or special characters.
        File names should be clean for screenshots.

    Example:
        Russian Federation -> Russian_Federation
    """

    # Remove special characters.
    name = re.sub(r"[^\w\s-]", "", name)

    # Replace multiple spaces with underscore.
    name = re.sub(r"\s+", "_", name.strip())

    # Return cleaned name.
    # If somehow empty, return "unknown".
    return name or "unknown"


def save_screenshot(page, country, step):
    """
    Purpose:
        Take screenshot and save it with country name and step name.

    Why:
        Screenshot helps confirm what happened during testing.

    Example file:
        Argentina_after_country_selection_20260424_131953.png
    """

    # Create file name using country, step, and timestamp.
    file_name = f"{safe_name(country)}_{step}_{datetime.now().strftime('%Y%m%d_%H%M%S')}.png"

    # Create full screenshot path.
    path = os.path.join(SCREENSHOT_DIR, file_name)

    try:
        # full_page=True captures complete page, not just visible screen.
        page.screenshot(path=path, full_page=True)

        print(f"  📸 Screenshot saved: {path}")

        # Return screenshot path so it can be written to CSV.
        return path

    except Exception as e:
        print(f"  ⚠ Screenshot failed: {e}")
        return ""


def wait_page(page, extra_ms=1500):
    """
    Purpose:
        Wait for the page to load safely.

    Why:
        Modern websites load content using JavaScript/API calls.
        If we click/check too fast, script may fail.

    domcontentloaded:
        Basic HTML is loaded.

    networkidle:
        Network activity is mostly completed.

    extra_ms:
        Additional wait time for dynamic content.
    """

    try:
        page.wait_for_load_state("domcontentloaded", timeout=15000)
    except:
        pass

    try:
        page.wait_for_load_state("networkidle", timeout=15000)
    except:
        pass

    # Extra wait for safety.
    page.wait_for_timeout(extra_ms)


def scroll_down(page, times=4, distance=500):
    """
    Purpose:
        Scroll down page slowly.

    Why:
        Continue button is below the country dropdown.
        Scrolling makes it visible/clickable.

    times:
        Number of scroll actions.

    distance:
        How much to scroll each time.
    """

    for _ in range(times):
        page.mouse.wheel(0, distance)
        page.wait_for_timeout(350)


def get_text(el):
    """
    Purpose:
        Read text from a button/link/element.

    Why:
        Some elements do not expose text using inner_text().
        So we try multiple methods.

    Methods tried:
        inner_text
        textContent
        value
        aria-label
        title
    """

    try:
        text = el.inner_text(timeout=1000).strip()
        if text:
            return text
    except:
        pass

    try:
        return el.evaluate("""
            e => (
                e.innerText ||
                e.textContent ||
                e.value ||
                e.getAttribute('aria-label') ||
                e.getAttribute('title') ||
                ''
            ).trim()
        """)
    except:
        return ""


def is_blue_button(el):
    """
    Purpose:
        Check whether the element is Dell blue/cyan button.

    Why:
        Continue button text may change by language.
        In some countries, Playwright reads the text as empty.
        But the Continue button color is consistent.

    Example from your logs:
        rgb(66, 180, 230)
    """

    try:
        # Get CSS background color.
        bg = el.evaluate("e => window.getComputedStyle(e).backgroundColor")

        # Extract RGB numbers from color string.
        nums = re.findall(r"\d+", bg)

        if len(nums) < 3:
            return False, bg

        r = int(nums[0])
        g = int(nums[1])
        b = int(nums[2])

        # Blue/cyan condition.
        # This matches Dell continue button color range.
        is_blue = b >= 120 and g >= 100 and r <= 180

        return is_blue, bg

    except:
        return False, ""


def handle_cookie_popup(page):
    """
    Purpose:
        Click cookie popup if it appears.

    Why:
        Cookie popup may block the page and prevent clicks.

    If popup does not appear:
        Function simply returns False and script continues.
    """

    selectors = [
        "#onetrust-accept-btn-handler",
        "button:has-text('Accept')",
        "button:has-text('Accept All')",
        "button:has-text('I Accept')",
        "button:has-text('OK')",
        "button:has-text('Agree')",
        "button:has-text('Allow all')",

        # Chinese / Japanese cookie buttons
        "button:has-text('接受')",
        "button:has-text('同意')",
        "button:has-text('許可')",
    ]

    for selector in selectors:
        try:
            btn = page.locator(selector).first

            if btn.is_visible(timeout=1500):
                btn.click(timeout=5000)
                page.wait_for_timeout(800)

                print(f"  ✅ Cookie popup handled: {selector}")

                return True

        except:
            pass

    return False


# ==========================================================
# COUNTRY DROPDOWN FUNCTIONS
# ==========================================================


def get_all_countries(page):
    """
    Purpose:
        Read all countries from the dropdown.

    How:
        The country dropdown is a normal HTML <select>.
        We read all <option> values from it.

    Output:
        List of country names.
    """

    print("\n📋 Reading countries from dropdown...")

    # Find first dropdown on page.
    dropdown = page.locator("select").first

    # Wait until dropdown is visible.
    dropdown.wait_for(state="visible", timeout=10000)

    countries = []

    # Get all options inside dropdown.
    options = dropdown.locator("option")

    for i in range(options.count()):
        label = options.nth(i).inner_text().strip()
        value = options.nth(i).get_attribute("value") or ""

        # Skip empty option.
        if not label:
            continue

        label_lower = label.lower()

        # Skip placeholder/default option.
        if label_lower in ["select", "select country", "choose country", "country"]:
            continue

        if "select" in label_lower and not value:
            continue

        # Add actual country to list.
        countries.append(label)

    print(f"✅ Countries found: {len(countries)}")

    return countries


def select_country(page, country):
    """
    Purpose:
        Select one country from dropdown.

    Example:
        If country = Argentina,
        script selects Argentina from dropdown.
    """

    print(f"  🌍 Selecting country: {country}")

    dropdown = page.locator("select").first
    dropdown.wait_for(state="visible", timeout=10000)

    try:
        # Select country by visible label.
        dropdown.select_option(label=country)

        # Wait because Continue button updates after selection.
        page.wait_for_timeout(3000)

        print("  ✅ Country selected")

        return True

    except Exception as e:
        print(f"  ❌ Country selection failed: {e}")
        return False


# ==========================================================
# CONTINUE BUTTON CLICK FUNCTION
# ==========================================================


def click_continue_button(page, country):
    """
    Purpose:
        Click Continue button after country selection.

    Important problem:
        Continue button text changes by country/language.
        Sometimes Playwright sees Continue button text as empty.

    Solution:
        Click the visible Dell blue button inside page body.

    Safety:
        Do not click:
        - Select Your Region
        - Products
        - Resources
        - Contact
        - Header/menu buttons
    """

    print("  ➡ Looking for blue Continue button...")

    page.wait_for_timeout(2000)

    # Scroll down so Continue button comes into view.
    scroll_down(page, times=5, distance=450)

    # Get all possible button-like elements.
    elements = page.locator(
        "button, input[type='button'], input[type='submit'], a[role='button']"
    )

    candidates = []
    total = elements.count()

    print(f"  Total button-like elements found: {total}")

    for i in range(total):
        try:
            el = elements.nth(i)

            # Skip hidden elements.
            if not el.is_visible(timeout=1000):
                continue

            # Skip disabled elements.
            if not el.is_enabled(timeout=1000):
                continue

            # Get element size and position.
            box = el.bounding_box()

            if not box:
                continue

            # Skip very small icon buttons.
            if box["width"] < 70 or box["height"] < 25:
                continue

            # Get button text.
            text = get_text(el).strip()
            text_lower = text.lower()

            # Check if it is blue.
            is_blue, bg = is_blue_button(el)

            print(
                f"    Button: text='{text}' blue={is_blue} bg='{bg}' "
                f"x={round(box['x'],1)} y={round(box['y'],1)} "
                f"w={round(box['width'],1)} h={round(box['height'],1)}"
            )

            # Skip blocked menu/header buttons.
            if text_lower and any(blocked in text_lower for blocked in BLOCKED_BUTTON_TEXTS):
                print(f"    Skipped blocked button: '{text}'")
                continue

            # Continue button should be blue.
            if not is_blue:
                continue

            # Avoid header/top area.
            # Correct Continue button is inside page body.
            if box["y"] < 100:
                continue

            # Add this button as a candidate.
            candidates.append({
                "element": el,
                "text": text or "BLUE_CONTINUE_BUTTON",
                "box": box,
                "bg": bg,
            })

        except Exception as e:
            print(f"    ⚠ Button check failed: {e}")

    # If no blue button found, fail.
    if not candidates:
        print("  ❌ No blue Continue button found")
        save_screenshot(page, country, "continue_not_found")
        return False

    # If multiple blue buttons exist, choose first one from top to bottom.
    candidates.sort(key=lambda item: item["box"]["y"])

    button = candidates[0]
    el = button["element"]

    try:
        # Make sure button is visible in viewport.
        el.scroll_into_view_if_needed(timeout=5000)

        page.wait_for_timeout(500)

        # Screenshot before click for proof.
        save_screenshot(page, country, "before_continue_click")

        old_url = page.url

        # Click Continue.
        el.click(timeout=10000)

        print(f"  ✅ Continue clicked: text='{button['text']}', bg='{button['bg']}'")

        # Wait for product page to open.
        page.wait_for_timeout(5000)
        wait_page(page, extra_ms=2500)

        print(f"  URL before click: {old_url}")
        print(f"  URL after click : {page.url}")

        return True

    except Exception as e:
        print(f"  ❌ Continue click failed: {e}")
        save_screenshot(page, country, "continue_click_failed")
        return False


# ==========================================================
# RESULT VALIDATION FUNCTIONS
# ==========================================================


def get_product_count(body_lower):
    """
    Purpose:
        Try to read product count from page text.

    Examples:
        50 Results
        50 Ergebnisse
        50 个结果
        50 件の結果

    If no count is found:
        Return 1 because product page opened and no no-result text was found.
    """

    for pattern in COUNT_PATTERNS:
        match = re.search(pattern, body_lower)

        if match:
            count = int(match.group(1))

            if count > 0:
                return count

    return 1


def verify_results(page, country):
    """
    Purpose:
        Verify whether product page has products or not.

    Final business rule:
        If page shows:
            Nothing found
            0 Results
            no results found
        Then FAIL.

        Otherwise, after Continue click, mark PASS.

    Why simple rule:
        China, Taiwan, Japan pages are localized.
        Product card text can be difficult to detect.
        But no-product message is clear.
    """

    print("  🔎 Verifying product page...")

    # Wait longer for product page to load.
    page.wait_for_timeout(7000)
    wait_page(page, extra_ms=3000)

    screenshot = save_screenshot(page, country, "result_page")

    try:
        body_text = page.locator("body").inner_text(timeout=15000)
    except:
        body_text = ""

    body_lower = body_text.lower()

    print("  🧾 Page text sample:")
    print(body_text[:500])

    # Check exact zero-result patterns.
    for pattern in ZERO_RESULT_PATTERNS:
        if re.search(pattern, body_lower):
            print(f"  ❌ FAIL: Zero-result pattern found: {pattern}")

            screenshot = save_screenshot(page, country, "fail_zero_results")

            return "YES", "FAIL", f"No products: {pattern}", 0, screenshot

    # Check no-result text.
    for text in NO_RESULT_TEXTS:
        if text in body_lower:
            print(f"  ❌ FAIL: No-result text found: {text}")

            screenshot = save_screenshot(page, country, "fail_nothing_found")

            return "YES", "FAIL", f"No products: {text}", 0, screenshot

    # If no no-result message is found, mark PASS.
    products_count = get_product_count(body_lower)

    print("  ✅ PASS: Product page opened and no no-result message detected")

    screenshot = save_screenshot(page, country, "pass_product_page")

    return (
        "YES",
        "PASS",
        f"Product page opened. No no-result text found. Count={products_count}",
        products_count,
        screenshot,
    )


# ==========================================================
# TEST ONE COUNTRY
# ==========================================================


def test_country(browser, country):
    """
    Purpose:
        Test one country completely.

    Flow:
        1. Open fresh browser context
        2. Open Dell UPS page
        3. Handle cookie popup
        4. Select country
        5. Click Continue button
        6. Verify product page
        7. Return result row for CSV
    """

    # Default row is FAIL.
    # We update it to PASS only when validation passes.
    row = {
        "Country": country,
        "Results Page Opened": "NO",
        "Status": "FAIL",
        "Reason": "",
        "Continue Clicked": "NO",
        "Products Count": 0,
        "Screenshot": "",
    }

    # New browser context means fresh session for each country.
    context = browser.new_context(viewport={"width": 1440, "height": 1200})

    # Open new page/tab.
    page = context.new_page()

    try:
        print(f"\n🌐 Opening fresh page for: {country}")

        # Open Dell UPS Selector page.
        page.goto(BASE_URL, wait_until="domcontentloaded", timeout=60000)

        wait_page(page)

        # Accept cookie popup if present.
        handle_cookie_popup(page)

        # Select country.
        if not select_country(page, country):
            row["Reason"] = "Country selection failed"
            row["Screenshot"] = save_screenshot(page, country, "country_selection_failed")
            return row

        # Screenshot after country selection.
        row["Screenshot"] = save_screenshot(page, country, "after_country_selection")

        # Click Continue button.
        if not click_continue_button(page, country):
            row["Reason"] = "Continue button not clicked"
            row["Screenshot"] = save_screenshot(page, country, "continue_not_clicked")
            return row

        row["Continue Clicked"] = "YES"

        # Verify product page.
        opened, status, reason, count, screenshot = verify_results(page, country)

        row["Results Page Opened"] = opened
        row["Status"] = status
        row["Reason"] = reason
        row["Products Count"] = count
        row["Screenshot"] = screenshot

        return row

    except Exception as e:
        # Any unexpected error will be recorded as FAIL.
        row["Status"] = "FAIL"
        row["Reason"] = f"Unexpected error: {e}"
        row["Screenshot"] = save_screenshot(page, country, "unexpected_error")
        return row

    finally:
        # Close browser context after each country.
        # This keeps each country test clean.
        context.close()


# ==========================================================
# CSV FUNCTIONS
# ==========================================================


def create_csv():
    """
    Purpose:
        Create CSV file and write header row.
    """

    with open(CSV_FILE, "w", newline="", encoding="utf-8-sig") as file:
        writer = csv.DictWriter(file, fieldnames=CSV_COLUMNS)
        writer.writeheader()


def write_csv_row(row):
    """
    Purpose:
        Write one country result into CSV file.
    """

    with open(CSV_FILE, "a", newline="", encoding="utf-8-sig") as file:
        writer = csv.DictWriter(file, fieldnames=CSV_COLUMNS)
        writer.writerow(row)


# ==========================================================
# MAIN FUNCTION
# ==========================================================


def main():
    """
    Purpose:
        Main function controls the full script.

    Full flow:
        1. Start browser
        2. Open Dell page once
        3. Read all countries from dropdown
        4. Test countries one by one
        5. Write each result to CSV
        6. Print final summary
    """

    print("==================================================")
    print("Dell UPS Selector - Final Optimized Test")
    print("==================================================")
    print(f"URL: {BASE_URL}")
    print(f"CSV Report: {CSV_FILE}")
    print(f"Screenshots Folder: {SCREENSHOT_DIR}")

    # Create CSV file before starting tests.
    create_csv()

    # Start Playwright.
    with sync_playwright() as p:

        # Launch Chromium browser.
        browser = p.chromium.launch(
            headless=HEADLESS,
            slow_mo=SLOW_MO,
        )

        # Open page once just to collect countries.
        context = browser.new_context(viewport={"width": 1440, "height": 1200})
        page = context.new_page()

        print(f"\n🌐 Opening page to collect countries: {BASE_URL}")

        page.goto(BASE_URL, wait_until="domcontentloaded", timeout=60000)

        wait_page(page)

        handle_cookie_popup(page)

        # Read all countries from dropdown.
        countries = get_all_countries(page)

        # Close collection context.
        context.close()

        if not countries:
            print("\n❌ No countries found. Stopping.")
            browser.close()
            return

        print(f"\n📋 Total countries to test: {len(countries)}")

        pass_count = 0
        fail_count = 0

        # Loop countries one by one.
        for index, country in enumerate(countries, start=1):
            print("\n--------------------------------------------------")
            print(f"[{index}/{len(countries)}] Testing: {country}")
            print("--------------------------------------------------")

            # Test single country.
            row = test_country(browser, country)

            # Write country result immediately to CSV.
            write_csv_row(row)

            # Maintain summary counts.
            if row["Status"] == "PASS":
                pass_count += 1
                print(f"✅ PASS | {country} | {row['Reason']}")
            else:
                fail_count += 1
                print(f"❌ FAIL | {country} | {row['Reason']}")

        # Close browser after all countries are tested.
        browser.close()

        print("\n==================================================")
        print("TEST COMPLETED")
        print("==================================================")
        print(f"Total countries: {len(countries)}")
        print(f"PASS: {pass_count}")
        print(f"FAIL: {fail_count}")
        print(f"CSV Report: {CSV_FILE}")
        print(f"Screenshots Folder: {SCREENSHOT_DIR}")


# Python starts script from here.
if __name__ == "__main__":
    main()
