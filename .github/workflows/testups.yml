name: Test UPS Selector

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "testups.py"
      - ".github/workflows/testups.yml"

  pull_request:
    branches:
      - main
    paths:
      - "testups.py"
      - ".github/workflows/testups.yml"

jobs:
  test-ups:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Current folder:"
          pwd
          echo "Files:"
          ls -la

      - name: Check testups.py exists
        run: |
          if [ ! -f "testups.py" ]; then
            echo "ERROR: testups.py not found in repository root"
            echo "Available files:"
            find . -maxdepth 3 -type f
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Prepare output folder
        run: |
          mkdir -p dell_ups_test_output/screenshots

      - name: Make script CI compatible
        run: |
          echo "Updating script for GitHub Actions..."

          sed -i 's/HEADLESS = False/HEADLESS = True/g' testups.py
          sed -i 's/SLOW_MO = 80/SLOW_MO = 0/g' testups.py
          sed -i 's/SLOW_MO = 50/SLOW_MO = 0/g' testups.py

          echo "Checking HEADLESS value:"
          grep -n "HEADLESS" testups.py || true
          grep -n "SLOW_MO" testups.py || true

      - name: Run testups.py
        env:
          CI: true
        run: |
          python testups.py

      - name: Show output files
        if: always()
        run: |
          echo "Generated output:"
          find dell_ups_test_output -type f || true

      - name: Upload report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testups-output
          path: dell_ups_test_output/
          if-no-files-found: warn
          retention-days: 14
