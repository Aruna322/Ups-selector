      - name: Find and run dellups.py
        run: |
          echo "All dellups.py files found:"
          find . -name "dellups.py" -print

          SCRIPT_PATH=$(find . -name "dellups.py" | head -n 1)

          echo "Script path selected: $SCRIPT_PATH"

          echo "Showing lines 650 to 670 from selected file:"
          sed -n '650,670p' "$SCRIPT_PATH"

          echo "Checking syntax before running:"
          python -m py_compile "$SCRIPT_PATH"

          echo "Running script:"
          xvfb-run -a python "$SCRIPT_PATH"
