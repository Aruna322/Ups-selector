name: Dell UPS Selector Test

on:
  workflow_dispatch:

jobs:
  run-dellups-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show all files
        run: |
          echo "Current folder:"
          pwd
          echo "All files:"
          find . -maxdepth 5 -type f

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Find and run dellups.py
        run: |
          echo "Searching for dellups.py..."
          SCRIPT_PATH=$(find . -name "dellups.py" | head -n 1)

          echo "Script path found: $SCRIPT_PATH"

          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERROR: dellups.py not found in repository"
            echo "Available Python files:"
            find . -name "*.py"
            exit 1
          fi

          python "$SCRIPT_PATH"

      - name: Upload report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dellups-results
          path: |
            *.csv
            **/*.csv
            screenshots/
            **/screenshots/
