name: Check URLs Test

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "checkurls.py"
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

  pull_request:
    branches:
      - main
    paths:
      - "checkurls.py"
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

jobs:
  run-checkurls-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Current folder:"
          pwd
          echo "All files:"
          find . -maxdepth 6 -type f

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Create output folders
        run: |
          mkdir -p checkurls_output/screenshots

      - name: Check Python syntax
        run: |
          SCRIPT_PATH=$(find . -name "checkurls.py" | head -n 1)
          echo "Script path found: $SCRIPT_PATH"

          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERROR: checkurls.py not found"
            echo "Python files available:"
            find . -name "*.py"
            exit 1
          fi

          python -m py_compile "$SCRIPT_PATH"

      - name: Run checkurls.py
        run: |
          SCRIPT_PATH=$(find . -name "checkurls.py" | head -n 1)
          echo "Running script: $SCRIPT_PATH"
          xvfb-run -a python "$SCRIPT_PATH"

      - name: Show generated output
        if: always()
        run: |
          echo "After test run, files are:"
          find . -maxdepth 6 -type f
          echo "checkurls_output folder:"
          ls -la checkurls_output || true
          echo "screenshots folder:"
          ls -la checkurls_output/screenshots || true

      - name: Upload report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkurls-results
          if-no-files-found: warn
          path: |
            checkurls_output/**
            **/*.csv
            **/*.png
            **/*.html
            **/*.json
